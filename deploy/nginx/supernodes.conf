# Trust Cloudflare visitor IP for logging and rate limits.
# Access control uses $realip_remote_addr (the CF edge IP), not $remote_addr.
include /etc/nginx/cloudflare-ips.conf;
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

geo $realip_remote_addr $cloudflare_traffic {
    default 0;
    include /etc/nginx/cloudflare-geo.conf;
}

server {
    listen 80;
    server_name agents.supernodes.ai;

    if ($cloudflare_traffic = 0) {
        return 403;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name agents.supernodes.ai;

    ssl_certificate     /etc/ssl/supernodes/origin.pem;
    ssl_certificate_key /etc/ssl/supernodes/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    if ($cloudflare_traffic = 0) {
        return 403;
    }

    # Serve branding assets directly so /favicon.ico is never SPA-fallback HTML.
    location = /favicon.ico {
        alias /opt/supernodes/out/renderer/favicon.ico;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location ^~ /pwa/ {
        alias /opt/supernodes/out/renderer/pwa/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}
