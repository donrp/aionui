# Wildcard nginx config for Phase 2 — per-client subdomains route to assigned ports.
# Demo instance (agents) uses port 3000; clients use 3001+.

map $host $supernodes_backend_port {
    default 3000;
    agents.supernodes.ai 3000;
    # Add client mappings here or generate via create-client.sh:
    # clientname.supernodes.ai 3001;
}

server {
    listen 80;
    server_name agents.supernodes.ai *.supernodes.ai;

    location / {
        proxy_pass http://127.0.0.1:$supernodes_backend_port;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}
