<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>笔记本 · 助手记忆 · 线框图</title>
    <style>
      :root {
        --bg-base: #ffffff;
        --bg-1: #f9fafb;
        --bg-2: #f2f3f5;
        --bg-3: #e5e6eb;
        --t1: #1d2129;
        --t2: #454d5f;
        --t3: #86909c;
        --t4: #c9cdd4;
        --border: #e5e6eb;
        --border-light: #f2f3f5;
        --aou-1: #eff0f6;
        --aou-2: #e5e7f0;
        --aou-6: #7583b2;
        --aou-7: #596590;
        --primary: #165dff;
        --success: #00b42a;
        --warning: #ff7d00;
        --danger: #f53f3f;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        background: var(--bg-2);
        color: var(--t1);
        font-size: 13px;
        line-height: 1.5;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      .topbar {
        flex: 0 0 auto;
        background: var(--bg-base);
        border-bottom: 1px solid var(--border);
      }
      .topbar-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
      }
      .topbar-row.phases {
        border-bottom: 1px solid var(--border-light);
      }
      .doc-title {
        font-weight: 600;
        font-size: 13px;
        color: var(--aou-7);
        margin-right: 8px;
        white-space: nowrap;
      }
      .feat-tabs {
        display: flex;
        align-items: center;
        gap: 2px;
        padding: 7px 14px;
        overflow-x: auto;
      }
      .feat-btn {
        flex: 0 0 auto;
        border: none;
        background: transparent;
        cursor: pointer;
        padding: 5px 10px;
        border-radius: 7px;
        font-size: 12px;
        color: var(--t3);
        white-space: nowrap;
      }
      .feat-btn:hover {
        background: var(--bg-2);
      }
      .feat-btn.on {
        background: var(--aou-1);
        color: var(--aou-7);
        font-weight: 600;
      }
      .feat-btn .fc {
        font-family: ui-monospace, monospace;
        font-size: 10.5px;
        opacity: 0.65;
        margin-right: 4px;
      }

      .split {
        flex: 1 1 auto;
        display: flex;
        min-height: 0;
      }
      .left {
        flex: 1 1 58%;
        min-width: 0;
        overflow: auto;
        padding: 24px;
        background: var(--bg-2);
      }
      .right {
        flex: 0 0 42%;
        max-width: 560px;
        min-width: 0;
        overflow: auto;
        background: var(--bg-base);
        border-left: 1px solid var(--border);
        padding: 24px 26px;
      }
      .split.full .left {
        flex: 1 1 100%;
      }
      .split.full .right {
        display: none;
      }
      @media (max-width: 920px) {
        .split {
          flex-direction: column;
        }
        .right {
          flex: none;
          max-width: none;
          border-left: none;
          border-top: 1px solid var(--border);
        }
      }

      .req .fcode {
        font-family: ui-monospace, monospace;
        font-size: 12px;
        color: var(--aou-6);
        font-weight: 600;
      }
      .req h2 {
        font-size: 17px;
        margin: 3px 0 0;
      }
      .req .flags {
        margin: 9px 0 16px;
        display: flex;
        gap: 6px;
      }
      .badge {
        display: inline-block;
        font-size: 11px;
        padding: 2px 9px;
        border-radius: 20px;
        font-weight: 500;
      }
      .badge.new {
        background: #e8f9ee;
        color: #0a8a2c;
      }
      .badge.mod {
        background: #fff3e0;
        color: #cc7000;
      }
      .badge.keep {
        background: var(--bg-2);
        color: var(--t3);
      }
      .req h3 {
        font-size: 12px;
        margin: 20px 0 7px;
        color: var(--t3);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        font-weight: 600;
      }
      .req p,
      .req li {
        font-size: 13px;
        color: var(--t2);
      }
      .req ul {
        margin: 6px 0;
        padding-left: 18px;
      }
      .req li {
        margin-bottom: 5px;
      }
      .story {
        background: var(--aou-1);
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 13px;
        color: var(--t2);
        margin: 2px 0 4px;
      }
      .story b {
        color: var(--aou-7);
      }
      .ac div {
        font-size: 12.5px;
        color: var(--t2);
        padding: 3px 0 3px 22px;
        position: relative;
      }
      .ac div:before {
        content: '';
        position: absolute;
        left: 4px;
        top: 8px;
        width: 11px;
        height: 11px;
        border: 1.5px solid var(--t4);
        border-radius: 3px;
      }
      .note {
        font-size: 12px;
        color: var(--t3);
        background: var(--bg-1);
        border-radius: 8px;
        padding: 10px 12px;
        margin-top: 12px;
      }
      .req table {
        width: 100%;
        border-collapse: collapse;
        margin: 8px 0;
        font-size: 12px;
      }
      .req th,
      .req td {
        border: 1px solid var(--border);
        padding: 6px 9px;
        text-align: left;
        vertical-align: top;
      }
      .req th {
        background: var(--bg-2);
        font-weight: 600;
      }

      .app {
        background: var(--bg-base);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(29, 33, 41, 0.06);
        max-width: 900px;
        margin: 0 auto;
      }
      .titlebar {
        height: 36px;
        background: var(--bg-2);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 12px;
        gap: 12px;
      }
      .tb-dots {
        display: flex;
        gap: 7px;
      }
      .tb-dots i {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        display: block;
      }
      .tb-dots .r {
        background: #ff5f57;
      }
      .tb-dots .y {
        background: #febc2e;
      }
      .tb-dots .g {
        background: #28c840;
      }
      .tb-ico {
        color: var(--t3);
        font-size: 14px;
      }
      .tb-brand {
        flex: 1;
        text-align: center;
        font-weight: 600;
        font-size: 12.5px;
        color: var(--t2);
      }
      .body {
        display: flex;
        height: 540px;
      }
      .sider {
        flex: 0 0 200px;
        background: var(--bg-2);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 10px 8px;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 9px;
        font-weight: 700;
        font-size: 14px;
        color: var(--aou-7);
        padding: 5px 8px 12px;
      }
      .logo .sq {
        width: 24px;
        height: 24px;
        border-radius: 7px;
        background: linear-gradient(135deg, var(--aou-6), var(--aou-7));
      }
      .si {
        height: 34px;
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 0 10px;
        border-radius: 8px;
        font-size: 14px;
        color: var(--t2);
        cursor: pointer;
        font-weight: 500;
      }
      .si:hover {
        background: var(--bg-3);
      }
      .si.on {
        background: var(--bg-3);
        font-weight: 600;
        color: var(--t1);
      }
      .si .di {
        width: 20px;
        text-align: center;
        font-size: 15px;
        color: var(--t3);
      }
      .si.on .di {
        color: var(--aou-6);
      }
      .si-div {
        height: 1px;
        background: var(--border);
        margin: 8px 6px;
      }
      .si-grp {
        font-size: 11px;
        color: var(--t3);
        padding: 10px 10px 3px;
        font-weight: 600;
      }
      .si-sp {
        flex: 1;
      }
      .main {
        flex: 1;
        min-width: 0;
        background: var(--bg-base);
        overflow: auto;
        position: relative;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        border: 1px solid var(--border);
        background: var(--bg-base);
        border-radius: 8px;
        padding: 6px 13px;
        font-size: 13px;
        color: var(--t1);
        cursor: pointer;
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--bg-1);
      }
      .btn.pri {
        background: var(--aou-6);
        border-color: var(--aou-6);
        color: #fff;
      }
      .btn.sm {
        padding: 4px 10px;
        font-size: 12px;
        border-radius: 6px;
      }
      .btn.txt {
        border-color: transparent;
        background: transparent;
        color: var(--aou-7);
        padding: 4px 6px;
      }

      .spot {
        position: relative;
        outline: 2px solid var(--aou-6);
        outline-offset: 3px;
        border-radius: 10px;
      }
      .spot-tag {
        position: absolute;
        top: -11px;
        left: 10px;
        background: var(--aou-6);
        color: #fff;
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 8px;
        z-index: 3;
        font-weight: 500;
        letter-spacing: 0.02em;
      }

      /* 编辑页（全屏分区，复用助手详情页骨架） */
      .ep {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      .ep-bar {
        flex: 0 0 auto;
        height: 48px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 0 18px;
      }
      .ep-back {
        color: var(--aou-7);
        cursor: pointer;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .ep-title {
        font-weight: 600;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .ep-av {
        width: 24px;
        height: 24px;
        border-radius: 7px;
        background: var(--aou-1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
      }
      .ep-tabs {
        display: flex;
        gap: 18px;
        border-bottom: 1px solid var(--border);
        padding: 0 18px;
        flex: 0 0 auto;
      }
      .ep-tabs span {
        padding: 10px 0;
        font-size: 13px;
        color: var(--t3);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
      }
      .ep-tabs span.on {
        color: var(--aou-7);
        border-bottom-color: var(--aou-6);
        font-weight: 600;
      }
      .ep-body {
        flex: 1;
        overflow: auto;
        padding: 18px;
        max-width: 640px;
        margin: 0 auto;
        width: 100%;
      }

      /* 笔记本分组 + 卡片 */
      .grp-h {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 18px 0 9px;
      }
      .grp-h:first-child {
        margin-top: 2px;
      }
      .grp-h .gn {
        font-size: 13px;
        font-weight: 600;
        color: var(--t1);
      }
      .grp-tag {
        font-size: 10px;
        padding: 1px 8px;
        border-radius: 10px;
        font-weight: 500;
      }
      .grp-tag.global {
        background: #e8f9ee;
        color: #0a8a2c;
      }
      .grp-tag.proj {
        background: var(--aou-1);
        color: var(--aou-7);
      }
      .grp-cnt {
        font-size: 11px;
        color: var(--t4);
        margin-left: auto;
      }
      .ncard {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--bg-base);
        padding: 11px 13px;
        margin-bottom: 9px;
        display: flex;
        gap: 11px;
        align-items: flex-start;
      }
      .ncard:hover {
        background: var(--bg-1);
      }
      .ncard .nbody {
        flex: 1;
        min-width: 0;
      }
      .ncard .ntext {
        font-size: 13px;
        color: var(--t1);
        line-height: 1.55;
      }
      .ncard .nmeta {
        font-size: 11px;
        color: var(--t4);
        margin-top: 6px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .src {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 10.5px;
        padding: 1px 7px;
        border-radius: 9px;
        background: var(--bg-2);
        color: var(--t3);
      }
      .src .sd {
        width: 11px;
        height: 11px;
        border-radius: 4px;
        display: inline-block;
      }
      .src .sd.claude {
        background: #d97757;
      }
      .src .sd.gemini {
        background: #4285f4;
      }
      .src .sd.user {
        background: var(--aou-6);
      }
      .ndel {
        color: var(--t4);
        cursor: pointer;
        font-size: 14px;
        flex: 0 0 auto;
        padding: 2px 4px;
      }
      .ndel:hover {
        color: var(--danger);
      }

      /* 空状态 */
      .empty {
        text-align: center;
        padding: 52px 24px;
        color: var(--t3);
      }
      .empty .ei {
        font-size: 34px;
        margin-bottom: 12px;
        opacity: 0.5;
      }
      .empty .eh {
        font-size: 14px;
        color: var(--t2);
        font-weight: 500;
        margin-bottom: 6px;
      }
      .empty .ed {
        font-size: 12.5px;
        color: var(--t4);
        max-width: 340px;
        margin: 0 auto;
        line-height: 1.6;
      }

      /* 对话场景 */
      .conv {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      .conv-h {
        flex: 0 0 auto;
        height: 44px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 0 16px;
        font-size: 13px;
      }
      .conv-h .av {
        width: 24px;
        height: 24px;
        border-radius: 7px;
        background: var(--aou-1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
      }
      .conv-h .nm {
        font-weight: 600;
      }
      .conv-h .ws {
        font-size: 11px;
        color: var(--t4);
        margin-left: auto;
      }
      .conv-b {
        flex: 1;
        overflow: auto;
        padding: 18px 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .msg {
        max-width: 78%;
        font-size: 12.5px;
        line-height: 1.55;
        padding: 9px 12px;
        border-radius: 12px;
      }
      .msg.u {
        align-self: flex-end;
        background: var(--aou-6);
        color: #fff;
        border-bottom-right-radius: 4px;
      }
      .msg.a {
        align-self: flex-start;
        background: var(--bg-2);
        color: var(--t1);
        border-bottom-left-radius: 4px;
      }
      .sysline {
        align-self: center;
        font-size: 11.5px;
        color: var(--aou-7);
        background: var(--aou-1);
        border: 1px solid var(--aou-2);
        border-radius: 20px;
        padding: 5px 13px;
        display: flex;
        align-items: center;
        gap: 6px;
        max-width: 90%;
      }
      .sysline .si2 {
        font-size: 13px;
      }
      .recall {
        align-self: center;
        font-size: 11px;
        color: var(--t4);
        background: var(--bg-1);
        border: 1px dashed var(--border);
        border-radius: 8px;
        padding: 7px 12px;
        max-width: 90%;
        text-align: center;
        line-height: 1.5;
      }

      /* 确认弹窗 */
      .modal-stage {
        position: absolute;
        inset: 0;
        background: rgba(29, 33, 41, 0.28);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .modal {
        width: 100%;
        max-width: 340px;
        background: var(--bg-base);
        border-radius: 14px;
        border: 1px solid var(--border);
        overflow: hidden;
        box-shadow: 0 16px 48px rgba(29, 33, 41, 0.22);
      }
      .modal-h {
        padding: 18px 20px 6px;
        font-weight: 600;
        font-size: 15px;
      }
      .modal-b {
        padding: 0 20px 14px;
        font-size: 12.5px;
        color: var(--t3);
        line-height: 1.6;
      }
      .modal-f {
        padding: 12px 20px;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: flex-end;
        gap: 9px;
      }
      .btn.danger {
        background: var(--danger);
        border-color: var(--danger);
        color: #fff;
      }

      /* overview */
      .ov {
        max-width: 880px;
        margin: 0 auto;
      }
      .ov h2 {
        font-size: 19px;
        margin: 0 0 4px;
      }
      .ov .lead {
        color: var(--t3);
        font-size: 13px;
        margin-bottom: 20px;
      }
      .ov h3 {
        font-size: 14px;
        margin: 22px 0 9px;
        color: var(--t1);
        border-left: 3px solid var(--aou-6);
        padding-left: 9px;
      }
      .ov table {
        width: 100%;
        border-collapse: collapse;
        margin: 8px 0;
        font-size: 12.5px;
      }
      .ov th,
      .ov td {
        border: 1px solid var(--border);
        padding: 7px 10px;
        text-align: left;
        vertical-align: top;
      }
      .ov th {
        background: var(--bg-2);
        font-weight: 600;
      }
      .ov code {
        font-family: ui-monospace, monospace;
        background: var(--bg-2);
        padding: 1px 5px;
        border-radius: 4px;
        font-size: 11.5px;
        color: var(--aou-7);
      }
      .erd {
        background: var(--bg-1);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 16px;
        font-family: ui-monospace, monospace;
        font-size: 12px;
        line-height: 1.9;
        color: var(--t2);
        overflow: auto;
      }
      .erd b {
        color: var(--aou-7);
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="topbar-row phases">
        <a href="../../index.html" style="font-size: 13px; color: var(--aou-7); text-decoration: none; white-space: nowrap"
          >← 文档首页</a
        >
        <span style="color: var(--border)">|</span>
        <span class="doc-title">笔记本 · 助手记忆 · 线框图</span>
      </div>
      <div class="feat-tabs" id="featTabs"></div>
    </div>
    <div class="split" id="split">
      <div class="left" id="left"></div>
      <div class="right" id="right"></div>
    </div>

    <script>
      /* ============ 外壳：设置 → 助手详情 ============ */
      function shellSettings(inner, navOn) {
        return `<div class="app">
    <div class="titlebar"><span class="tb-dots"><i class="r"></i><i class="y"></i><i class="g"></i></span>
      <span class="tb-ico">☰</span><span class="tb-brand">AionUi · 设置</span><span class="tb-ico">⤢</span></div>
    <div class="body">
      <div class="sider"><div class="logo"><span class="sq"></span>AionUi</div>
        <div class="si-grp">AI 核心</div>
        <div class="si"><span class="di">🧩</span>Agents</div>
        <div class="si"><span class="di">🧠</span>Model</div>
        <div class="si ${navOn === 'assistants' ? 'on' : ''}"><span class="di">💬</span>Assistants</div>
        <div class="si"><span class="di">⚡</span>Capabilities</div>
        <div class="si-grp">应用</div>
        <div class="si"><span class="di">🎨</span>Display</div>
        <div class="si"><span class="di">ℹ️</span>About</div>
        <div class="si-sp"></div>
        <div class="si"><span class="di">←</span>返回</div>
      </div>
      <div class="main">${inner}</div></div></div>`;
      }
      /* ============ 外壳：对话 ============ */
      function shellChat(inner) {
        return `<div class="app">
    <div class="titlebar"><span class="tb-dots"><i class="r"></i><i class="y"></i><i class="g"></i></span>
      <span class="tb-ico">☰</span><span class="tb-brand">AionUi</span><span class="tb-ico">⤢</span></div>
    <div class="body">
      <div class="sider"><div class="logo"><span class="sq"></span>AionUi</div>
        <div class="si"><span class="di">＋</span>新建会话</div>
        <div class="si"><span class="di">🔍</span>搜索会话</div>
        <div class="si-div"></div>
        <div class="si-grp">建模助手 · 办公楼项目</div>
        <div class="si on">参数化脚本调试</div>
        <div class="si">幕墙节点核对</div>
        <div class="si-sp"></div>
        <div class="si"><span class="di">⚙️</span>设置</div>
      </div>

        h += `<h3>需求</h3><ul>` + r.need.map((n) => `<li>${n}</li>`).join('') + `</ul>`;

        }
        if (r.flow) {
          h += `<h3>正常流程</h3><ul>` + r.flow.map((f, i) => `<li>${i + 1}. ${f}</li>`).join('') + `</ul>`;
        }
        if (r.exc) {
          h += `<h3>异常情况</h3><ul>` + r.exc.map((e) => `<li>${e}</li>`).join('') + `</ul>`;
        }
        h += `<h3>验收标准</h3><div class="ac">` + r.ac.map((a) => `<div>${a}</div>`).join('') + `</div>`;
        h += `</div>`;
        return h;
      }

      /* ============ 控制器 ============ */
      const tabsEl = document.getElementById('featTabs');
      const splitEl = document.getElementById('split');
      const leftEl = document.getElementById('left');
      const rightEl = document.getElementById('right');
      let cur = 'ov';
      function build() {
        tabsEl.innerHTML = FEATS.map(
          (f) => `<button class="feat-btn ${f.id === cur ? 'on' : ''}" data-id="${f.id}">
    ${f.code ? `<span class="fc">${f.code}</span>` : ''}${f.name}</button>`
        ).join('');
        tabsEl.querySelectorAll('.feat-btn').forEach(
          (b) =>
            (b.onclick = () => {
              cur = b.dataset.id;
              build();
            })
        );
        const f = FEATS.find((x) => x.id === cur);
        leftEl.innerHTML = f.render();
        if (f.full) {
          splitEl.classList.add('full');
          rightEl.innerHTML = '';
        } else {
          splitEl.classList.remove('full');
          rightEl.innerHTML = renderReq(f.req);
        }
      }
      build();
    </script>
  </body>
</html>
