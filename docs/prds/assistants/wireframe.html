<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>助手与 Agent 统一 · 线框图</title>
<style>
  :root{
    /* 背景色阶 */
    --bg-base:#ffffff; --bg-1:#f9fafb; --bg-2:#f2f3f5; --bg-3:#e5e6eb;
    /* 文字 */
    --t1:#1d2129; --t2:#454d5f; --t3:#86909c; --t4:#c9cdd4;
    /* 边框 */
    --border:#e5e6eb; --border-light:#f2f3f5;
    /* 品牌 aou */
    --aou-1:#eff0f6; --aou-2:#e5e7f0; --aou-6:#7583b2; --aou-7:#596590;
    --agent-bar:#eaecf7;
    /* 语义 */
    --primary:#165dff; --success:#00b42a; --warning:#ff7d00; --danger:#f53f3f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg-2); color:var(--t1); font-size:13px; line-height:1.5;
    display:flex;flex-direction:column;height:100vh;overflow:hidden;
  }

  /* ===== 顶部导航：期 + 功能点 ===== */
  .topbar{flex:0 0 auto;background:var(--bg-base);border-bottom:1px solid var(--border);}
  .topbar-row{display:flex;align-items:center;gap:8px;padding:8px 14px;}
  .topbar-row.phases{border-bottom:1px solid var(--border-light);}
  .doc-title{font-weight:600;font-size:13px;color:var(--aou-7);margin-right:8px;white-space:nowrap;}
  .phase-btn{flex:0 0 auto;border:1px solid var(--border);background:var(--bg-base);cursor:pointer;
    padding:6px 14px;border-radius:8px;font-size:12.5px;color:var(--t2);white-space:nowrap;font-weight:500;}
  .phase-btn:hover{background:var(--bg-2);}
  .phase-btn.on{background:var(--aou-6);border-color:var(--aou-6);color:#fff;}
  .feat-tabs{display:flex;align-items:center;gap:2px;padding:7px 14px;overflow-x:auto;}
  .feat-btn{flex:0 0 auto;border:none;background:transparent;cursor:pointer;padding:5px 10px;border-radius:7px;
    font-size:12px;color:var(--t3);white-space:nowrap;}
  .feat-btn:hover{background:var(--bg-2);}
  .feat-btn.on{background:var(--aou-1);color:var(--aou-7);font-weight:600;}
  .feat-btn .fc{font-family:ui-monospace,monospace;font-size:10.5px;opacity:.65;margin-right:4px;}

  /* ===== 左右分栏：左 wireframe / 右 需求 ===== */
  .split{flex:1 1 auto;display:flex;min-height:0;}
  .left{flex:1 1 58%;min-width:0;overflow:auto;padding:24px;background:var(--bg-2);}
  .right{flex:0 0 42%;max-width:560px;min-width:0;overflow:auto;background:var(--bg-base);border-left:1px solid var(--border);padding:24px 26px;}
  /* 总览：左侧占满、右侧隐藏 */
  .split.full .left{flex:1 1 100%;}
  .split.full .right{display:none;}
  .req-head{margin-bottom:14px;}
  .req-cols{display:flex;flex-direction:column;gap:0;}
  .req-cols h3{margin-top:18px;}
  .req-cols>div:first-child h3{margin-top:0;}
  @media(max-width:920px){.split{flex-direction:column;}.right{flex:none;max-width:none;border-left:none;border-top:1px solid var(--border);}}

  /* ===== 右侧需求文字 ===== */
  .req .fcode{font-family:ui-monospace,monospace;font-size:12px;color:var(--aou-6);font-weight:600;}
  .req h2{font-size:17px;margin:3px 0 0;}
  .req .flags{margin:9px 0 16px;display:flex;gap:6px;}
  .badge{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;font-weight:500;}
  .badge.new{background:#e8f9ee;color:#0a8a2c;}
  .badge.mod{background:#fff3e0;color:#cc7000;}
  .badge.keep{background:var(--bg-2);color:var(--t3);}
  .badge.phase{background:var(--aou-1);color:var(--aou-7);}
  .req h3{font-size:12px;margin:20px 0 7px;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;font-weight:600;}
  .req p,.req li{font-size:13px;color:var(--t2);}
  .req ul{margin:6px 0;padding-left:18px;}
  .req li{margin-bottom:5px;}
  .story{background:var(--aou-1);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--t2);margin:2px 0 4px;}
  .story b{color:var(--aou-7);}
  .ac div{font-size:12.5px;color:var(--t2);padding:3px 0 3px 22px;position:relative;}
  .ac div:before{content:"";position:absolute;left:4px;top:8px;width:11px;height:11px;border:1.5px solid var(--t4);border-radius:3px;}
  .note{font-size:12px;color:var(--t3);background:var(--bg-1);border-radius:8px;padding:10px 12px;margin-top:12px;}
  .req table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px;}
  .req th,.req td{border:1px solid var(--border);padding:6px 9px;text-align:left;vertical-align:top;}
  .req th{background:var(--bg-2);font-weight:600;}

  /* ===== App 外壳 ===== */
  .app{background:var(--bg-base);border:1px solid var(--border);border-radius:14px;overflow:hidden;
    box-shadow:0 4px 20px rgba(29,33,41,.06);max-width:900px;margin:0 auto;}
  .titlebar{height:36px;background:var(--bg-2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:12px;}
  .tb-dots{display:flex;gap:7px;}
  .tb-dots i{width:11px;height:11px;border-radius:50%;display:block;}
  .tb-dots .r{background:#ff5f57;}.tb-dots .y{background:#febc2e;}.tb-dots .g{background:#28c840;}
  .tb-ico{color:var(--t3);font-size:14px;}
  .tb-brand{flex:1;text-align:center;font-weight:600;font-size:12.5px;color:var(--t2);}
  .body{display:flex;height:540px;}
  .sider{flex:0 0 210px;background:var(--bg-2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:10px 8px;}
  .logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:14px;color:var(--aou-7);padding:5px 8px 12px;}
  .logo .sq{width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,var(--aou-6),var(--aou-7));}
  .si{height:34px;display:flex;align-items:center;gap:9px;padding:0 10px;border-radius:8px;font-size:14px;color:var(--t2);cursor:pointer;font-weight:500;}
  .si:hover{background:var(--bg-3);}
  .si.on{background:var(--bg-3);font-weight:600;color:var(--t1);}
  .si .di{width:20px;text-align:center;font-size:15px;color:var(--t3);}
  .si.on .di{color:var(--aou-6);}
  .si-div{height:1px;background:var(--border);margin:8px 6px;}
  .si-grp{font-size:11px;color:var(--t3);padding:10px 10px 3px;font-weight:600;}
  .si-sp{flex:1;}
  .main{flex:1;min-width:0;background:var(--bg-base);overflow:auto;position:relative;}

  /* 通用控件 */
  .page{padding:22px 24px;max-width:660px;margin:0 auto;}
  .ptitle{font-size:16px;font-weight:600;margin:0 0 3px;}
  .pdesc{font-size:12.5px;color:var(--t3);margin:0 0 18px;}
  .arco-tabs{display:flex;gap:20px;border-bottom:1px solid var(--border);margin-bottom:16px;}
  .arco-tabs span{padding:7px 0;font-size:14px;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
  .arco-tabs span.on{color:var(--primary);border-bottom-color:var(--primary);font-weight:500;}
  .btn{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--border);background:var(--bg-base);
    border-radius:8px;padding:6px 13px;font-size:13px;color:var(--t1);cursor:pointer;white-space:nowrap;}
  .btn:hover{background:var(--bg-1);}
  .btn.pri{background:var(--aou-6);border-color:var(--aou-6);color:#fff;}
  .btn.pri:hover{background:var(--aou-7);}
  .btn.sm{padding:4px 10px;font-size:12px;border-radius:6px;}
  .btn.txt{border-color:transparent;background:transparent;color:var(--aou-7);padding:4px 6px;}
  .link{color:var(--aou-7);cursor:pointer;font-size:12px;}
  .link:hover{text-decoration:underline;}
  .sect-h{font-size:12px;color:var(--t3);margin:16px 0 10px;font-weight:600;}

  /* spotlight 高亮 */
  .spot{position:relative;outline:2px solid var(--aou-6);outline-offset:3px;border-radius:10px;}
  .spot-tag{position:absolute;top:-11px;left:10px;background:var(--aou-6);color:#fff;font-size:10px;
    padding:2px 8px;border-radius:8px;z-index:3;font-weight:500;letter-spacing:.02em;}

  /* Agent 卡片网格 */
  .agrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .acard{min-height:150px;border:1px solid var(--border);border-radius:12px;padding:14px 12px;background:var(--bg-2);
    display:flex;flex-direction:column;align-items:center;text-align:center;gap:9px;}
  .acard:hover{border-color:var(--t4);}
  .acard .av{width:40px;height:40px;border-radius:9px;background:var(--bg-base);display:flex;align-items:center;justify-content:center;font-size:21px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .acard .nm{font-size:13px;font-weight:600;}
  .acard .st{font-size:11px;display:flex;align-items:center;gap:5px;justify-content:center;}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
  .dot.ok{background:var(--success);}.dot.bad{background:var(--danger);}.dot.idle{background:var(--t4);}
  .st.ok{color:var(--success);}.st.bad{color:var(--danger);}.st.idle{color:var(--t3);}
  .info-i{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;
    background:var(--danger);color:#fff;font-size:9px;cursor:help;margin-left:3px;font-style:normal;}
  .acard .ft{margin-top:auto;}

  /* 助手列表行 */
  .arow{display:flex;align-items:center;gap:12px;border:1px solid var(--border);border-radius:8px;
    padding:9px 14px;margin-bottom:8px;background:var(--bg-base);}
  .arow:hover{background:var(--bg-1);}
  .arow .grip{color:var(--t4);cursor:grab;font-size:15px;}
  .arow .av{width:32px;height:32px;border-radius:8px;background:var(--aou-1);display:flex;align-items:center;justify-content:center;font-size:16px;}
  .arow .info{flex:1;min-width:0;}
  .arow .nm{font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px;}
  .arow .ds{font-size:12px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .arow .ops{display:flex;align-items:center;gap:10px;}
  .tag{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:500;}
  .tag.official{background:var(--aou-1);color:var(--aou-7);}
  .warn-i{color:var(--danger);font-size:13px;cursor:help;}
  /* Switch */
  .sw{width:36px;height:20px;border-radius:12px;background:var(--aou-6);position:relative;cursor:pointer;flex:0 0 auto;transition:.2s;}
  .sw:after{content:"";position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;right:2px;box-shadow:0 1px 2px rgba(0,0,0,.2);}
  .sw.off{background:var(--t4);}.sw.off:after{right:auto;left:2px;}

  /* 编辑页（全屏分区） */
  .ep{display:flex;flex-direction:column;height:100%;}
  .ep-bar{flex:0 0 auto;height:48px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 18px;}
  .ep-back{color:var(--aou-7);cursor:pointer;font-size:13px;display:flex;align-items:center;gap:5px;}
  .ep-title{font-weight:600;font-size:14px;}
  .ep-body{flex:1;overflow:auto;padding:18px;max-width:620px;margin:0 auto;width:100%;}
  .card{position:relative;border:1px solid var(--border);border-radius:12px;background:var(--bg-base);padding:15px 16px;margin-bottom:13px;}
  .card-h{font-size:12px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.03em;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .legend{font-size:10px;border-radius:5px;padding:1px 7px;font-weight:500;text-transform:none;letter-spacing:0;}
  .legend.now{background:#e8f9ee;color:#0a8a2c;}
  .legend.next{background:#fff3e0;color:#cc7000;}
  .ro-flag{font-size:10px;color:var(--t3);background:var(--bg-2);border-radius:5px;padding:1px 7px;margin-left:auto;font-weight:500;text-transform:none;letter-spacing:0;}
  .row{display:flex;align-items:center;gap:12px;margin-bottom:11px;}
  .row:last-child{margin-bottom:0;}
  .lab{font-size:13px;color:var(--t2);width:78px;flex:0 0 auto;}
  .field{flex:1;border:1px solid var(--border);border-radius:8px;padding:7px 11px;font-size:13px;background:var(--bg-base);color:var(--t1);}
  .field.sel{display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
  .field.sel .ar{color:var(--t3);}
  .field.ro{background:var(--bg-2);color:var(--t3);}
  .av-lg{width:42px;height:42px;border-radius:10px;background:var(--aou-1);display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 auto;}
  .hint{font-size:11.5px;color:var(--t4);margin:-4px 0 11px 90px;}
  .txt-area{border:1px solid var(--border);border-radius:8px;padding:11px;font-size:13px;color:var(--t2);min-height:54px;background:var(--bg-base);}
  .banner{background:var(--aou-1);border:1px solid var(--aou-2);border-radius:10px;padding:11px 13px;font-size:12.5px;color:var(--aou-7);margin-bottom:14px;line-height:1.6;}
  .prompt-item{display:flex;align-items:center;gap:8px;font-size:13px;padding:6px 0;color:var(--t2);}
  .prompt-item .num{color:var(--t4);}
  .prompt-item .t{flex:1;}
  /* 下拉多选 */
  .dd{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--bg-base);box-shadow:0 4px 16px rgba(0,0,0,.08);}
  .dd-s{padding:8px 12px;border-bottom:1px solid var(--border-light);font-size:12.5px;color:var(--t4);}
  .dd-i{display:flex;align-items:center;gap:10px;padding:8px 12px;font-size:13px;cursor:pointer;color:var(--t1);}
  .dd-i:hover{background:var(--bg-2);}
  .cb{width:16px;height:16px;border:1.5px solid var(--t4);border-radius:4px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;}
  .cb.on{background:var(--aou-6);border-color:var(--aou-6);}
  .dd-i .src{margin-left:auto;font-size:10px;color:var(--t4);}

  /* 首页 */
  .guid{padding:30px 24px;max-width:580px;margin:0 auto;text-align:center;}
  .guid-h{font-size:17px;font-weight:600;margin-bottom:18px;}
  .pillbar{display:flex;align-items:center;gap:4px;background:var(--agent-bar);border-radius:30px;padding:6px;position:relative;}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:20px;font-size:13px;color:var(--t2);cursor:pointer;white-space:nowrap;opacity:.62;}
  .pill:hover{opacity:1;}
  .pill .pi{font-size:17px;}
  .pill.on{opacity:1;background:var(--bg-base);font-weight:600;color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.1);}
  .pill-more{margin-left:auto;color:var(--t2);cursor:pointer;padding:7px 11px;border-radius:18px;flex:0 0 auto;font-size:14px;}
  .pill-more:hover{background:var(--bg-base);}
  .inputcard{border:1px solid var(--border);border-radius:16px;padding:15px;margin-top:16px;text-align:left;background:var(--bg-base);box-shadow:0 1px 4px rgba(0,0,0,.04);}
  .input-ph{color:var(--t4);font-size:13.5px;min-height:38px;}
  .input-row{display:flex;align-items:center;gap:8px;margin-top:10px;}
  .chip{border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:12px;color:var(--t2);background:var(--bg-base);cursor:pointer;}
  .send{margin-left:auto;width:30px;height:30px;border-radius:50%;background:var(--aou-6);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;}
  .ws{font-size:11.5px;color:var(--t4);margin-top:8px;}
  .prompts-lab{font-size:12px;color:var(--t3);margin:18px 0 9px;text-align:left;}
  .pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
  .pchip{border:1px solid var(--border);border-radius:10px;padding:10px;font-size:12.5px;color:var(--t2);cursor:pointer;text-align:left;background:var(--bg-base);}
  .pchip:hover{border-color:var(--aou-6);color:var(--t1);}

  /* Modal（独立呈现，不套 app 外壳） */
  .modal-stage{min-height:100%;display:flex;align-items:flex-start;justify-content:center;
    background:repeating-linear-gradient(45deg,var(--bg-2),var(--bg-2) 12px,#eef0f3 12px,#eef0f3 24px);
    padding:44px 24px;}
  .modal{width:100%;max-width:480px;background:var(--bg-base);border-radius:16px;border:1px solid var(--border);overflow:hidden;box-shadow:0 16px 48px rgba(29,33,41,.22);}
  .modal-h{padding:20px 24px 16px;font-weight:500;font-size:18px;display:flex;justify-content:space-between;align-items:center;}
  .modal-x{color:var(--t3);cursor:pointer;font-size:16px;}
  .modal-b{padding:4px 24px 20px;}
  .modal-f{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
  .flabel{font-size:12px;font-weight:600;color:var(--t2);margin:14px 0 6px;}
  .flabel:first-child{margin-top:0;}
  .fsub{font-size:11.5px;color:var(--t3);font-weight:400;margin-bottom:7px;}
  .finput{border:1px solid var(--border);border-radius:8px;padding:8px 11px;font-size:13px;color:var(--t4);}
  .radio-list{border:1px solid var(--border);border-radius:10px;background:var(--bg-1);padding:6px;display:flex;flex-direction:column;gap:2px;}
  .rrow{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:8px;cursor:pointer;font-size:13px;}
  .rrow:hover{background:var(--bg-2);}
  .rrow.on{background:var(--aou-1);}
  .rrow.dis{opacity:.5;cursor:not-allowed;}
  .rdot{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--t4);flex:0 0 auto;}
  .rrow.on .rdot{border:5px solid var(--aou-6);}
  .rrow .ic{width:22px;height:22px;border-radius:6px;background:var(--bg-2);display:flex;align-items:center;justify-content:center;font-size:13px;}
  .rrow .gt{margin-left:auto;font-size:10.5px;color:var(--t4);}

  /* overview */
  .ov{max-width:880px;margin:0 auto;}
  .ov h2{font-size:19px;margin:0 0 4px;}
  .ov .lead{color:var(--t3);font-size:13px;margin-bottom:20px;}
  .ov h3{font-size:14px;margin:22px 0 9px;color:var(--t1);border-left:3px solid var(--aou-6);padding-left:9px;}
  .ov table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12.5px;}
  .ov th,.ov td{border:1px solid var(--border);padding:7px 10px;text-align:left;vertical-align:top;}
  .ov th{background:var(--bg-2);font-weight:600;}
  .ov code{font-family:ui-monospace,monospace;background:var(--bg-2);padding:1px 5px;border-radius:4px;font-size:11.5px;color:var(--aou-7);}
  .ph-pill{display:inline-block;font-size:11px;padding:1px 8px;border-radius:10px;background:var(--aou-1);color:var(--aou-7);font-weight:500;}
  .erd{background:var(--bg-1);border:1px solid var(--border);border-radius:10px;padding:16px;font-family:ui-monospace,monospace;font-size:11.5px;line-height:2;color:var(--t2);overflow:auto;}
  .erd b{color:var(--aou-7);}
</style>
</head>
<body>
<div id="gate" style="position:fixed;inset:0;background:linear-gradient(135deg,#5b6597,#7583b2);display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div style="background:#fff;border-radius:16px;padding:36px 40px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.25);text-align:center;font-family:-apple-system,sans-serif;">
    <div style="width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,#7583b2,#596590);margin:0 auto 16px;"></div>
    <h1 style="font-size:17px;margin:0 0 6px;">助手与 Agent 统一</h1>
    <p style="font-size:12.5px;color:#86909c;margin:0 0 20px;">线框图 · 请输入访问口令</p>
    <input id="gpw" type="password" placeholder="口令" autocomplete="off" style="width:100%;border:1px solid #e5e6eb;border-radius:9px;padding:11px 13px;font-size:14px;outline:none;text-align:center;letter-spacing:2px;" />
    <button id="genter" style="width:100%;margin-top:12px;border:none;background:#7583b2;color:#fff;border-radius:9px;padding:11px;font-size:14px;cursor:pointer;">进入</button>

/* ============ 场景：助手列表 ============ */
function sList(spot){
  function R(av,nm,ds,off,o){o=o||{};
    const grip=`<span class="grip" style="${spot==='sort'?'':'opacity:.3'}">⠿</span>`;
    const official=o.official?`<span class="tag official">官方</span>`:'';
    const warn=o.warn?`<span class="warn-i" title="Agent 不可用，请检查">⚠</span>`:'';
    const del=o.nodelete?'':`<span class="btn sm" style="color:var(--danger)">删除</span>`;
    return `<div class="arow">${grip}<span class="av">${av}</span>
      <span class="info"><span class="nm">${nm}${official?' '+official:''}${warn?' '+warn:''}</span><span class="ds">${ds}</span></span>
      <span class="ops"><span class="sw ${off?'off':''}"></span><span class="btn sm">编辑</span>${del}</span></div>`;
  }
  let rows;
  if(spot==='unavail'){
    rows = R('🟩','Gemini 助手','所依赖的 Agent 当前不可用',false,{warn:true,nodelete:true})
      + R('🟦','AionCLI','基于 AionCLI 的开箱即用助手',false,{nodelete:true})
      + R('🤝','Cowork','多智能体协作助手',false,{official:true,nodelete:true})
      + R('✍️','写作助手','帮你润色与改写文案',false,{});
  } else {
    rows = R('🟦','AionCLI','基于 AionCLI 的开箱即用助手',false,{nodelete:true})
      + R('🤝','Cowork','多智能体协作助手',false,{official:true,nodelete:true})
      + R('✍️','写作助手','帮你润色与改写文案',false,{})
      + R('🔍','代码审查','审查代码、找出潜在问题',true,{});
  }
  const spotList=['list','switch','sort','unavail'].includes(spot);
  const wrapped=spotList?`<div class="spot"><span class="spot-tag">本特性</span>${rows}</div>`:rows;
  return shell(`<div class="page">
    <div class="ptitle">Assistants</div>
    <div class="pdesc" style="display:flex;justify-content:space-between;align-items:center">
      <span>管理你的助手——拖拽排序、开关显隐、编辑或新建。</span><span class="btn pri sm">＋ 创建助手</span></div>
    ${wrapped}

    ${spot==='sort'?'<div class="note">拖拽行首的手柄调整顺序，即时影响首页助手列表的排列。</div>':''}
  </div>`,{settings:true,nav:'assistants',title:'设置'});
}

/* ============ 场景：助手编辑页（全屏分区） ============ */
function sEditor(spot){
  const builtin = spot==='builtin';
  const sc = k => spot===k?' spot':'';
  const ro = t => `<div class="field ro">${t}</div>`;

  const cardIdentity = `<div class="card${sc('identity')}">${tag(spot,'identity')}

    <div class="row"><div class="av-lg">${builtin?'🤝':'✍️'}</div><div style="flex:1">

      <div class="row"><div class="lab">描述</div>${builtin?ro('多智能体协作助手'):'<div class="field">帮你润色与改写文案</div>'}</div>

  const cardPrompts = builtin?'':`<div class="card${sc('prompts')}">${tag(spot,'prompts')}

  const cardEngine = `<div class="card">

    <div class="row"><div class="lab">主 Agent</div><div class="field sel">Claude <span class="ar">▾</span></div></div>
    <div class="hint">决定下方默认模型 / 权限能选哪些值</div></div>`;

  let cardDefault;
  if(spot==='skills'||spot==='mcp'){
    const isSkill=spot==='skills';
    cardDefault=`<div class="card spot"><span class="spot-tag">本特性</span>
      <div class="card-h">${isSkill?'默认技能':'默认 MCP'} <span class="legend next">仅对新会话生效</span>
        <span class="link" style="margin-left:auto">${isSkill?'去技能中心 →':'去 MCP 设置 →'}</span></div>
      <div class="row"><div class="lab">${isSkill?'默认技能':'默认 MCP'}</div><div class="field sel">已选 ${isSkill?'3':'1'} 项 <span class="ar">▾</span></div></div>
      <div class="dd" style="margin-top:7px">
        <div class="dd-s">🔍 搜索${isSkill?'技能':' MCP 服务'}…</div>
        ${isSkill?`
        <div class="dd-i"><span class="cb on">✓</span>文件操作</div>
        <div class="dd-i"><span class="cb on">✓</span>网页浏览</div>
        <div class="dd-i"><span class="cb on">✓</span>财报解析</div>
        <div class="dd-i"><span class="cb"></span>代码解释器</div>
        <div class="dd-i"><span class="cb"></span>翻译记忆库</div>`:`
        <div class="dd-i"><span class="cb on">✓</span>Filesystem</div>
        <div class="dd-i"><span class="cb"></span>GitHub</div>
        <div class="dd-i"><span class="cb"></span>Postgres</div>`}
      </div></div>`;
  } else {
    const on=(spot==='defaults'||spot==='pref');
    cardDefault=`<div class="card${on?' spot':''}">${on?'<span class="spot-tag">本特性</span>':''}
      <div class="card-h">默认配置 <span class="legend next">仅对新会话生效</span></div>
      <div class="row"><div class="lab">默认模型</div><div class="field sel">暂不设置（自动记住上次）<span class="ar">▾</span></div></div>
      <div class="hint">未设置时，以你最近一次用这个助手时选择的值作为下次默认。</div>
      <div class="row"><div class="lab">默认权限</div><div class="field sel">暂不设置（自动记住上次）<span class="ar">▾</span></div></div>
      <div class="row"><div class="lab">默认技能</div><div class="field sel">已选 3 项 <span class="ar">▾</span></div></div>
      <div class="row"><div class="lab">默认 MCP</div><div class="field sel">已选 1 项 <span class="ar">▾</span></div></div></div>`;

  const cardRules = `<div class="card">

    <div class="txt-area"${builtin?' style="color:var(--t3)"':''}>你是一个专业的中文写作助手，擅长…（Markdown）</div></div>`;

  const builtinExtra = builtin?`<div class="card spot"><span class="spot-tag">本特性</span>
    <div class="card-h">官方维护内容 <span class="ro-flag">🔒 只读</span></div>
    <div class="row"><div class="lab">技能</div>${ro('网页浏览、代码解释器…')}</div>
    <div class="row"><div class="lab">推荐提示词</div>${ro('共 3 条')}</div>
    <div class="hint" style="margin-left:0">以上内容由官方维护、随版本更新，照常展示当前值但不可编辑。</div></div>`:'';

  const banner = builtin?`<div class="banner${sc('builtin')}">${tag(spot,'builtin')}
    ℹ️ 这是官方助手，会随版本更新持续优化。你可以更换它的引擎与默认模型 / 权限；若要自定义名称、规则、技能等内容，请点右上角「创建副本」。</div>`:'';

  const blocks = builtin
    ? `${banner}${cardIdentity}${cardEngine}${cardDefault}${cardRules}${builtinExtra}`
    : `${cardIdentity}${cardPrompts}${cardEngine}${cardDefault}${cardRules}`;

  const right = builtin
    ? `<span class="btn pri sm">基于此助手创建副本</span>`
    : `<span class="btn sm">取消</span><span class="btn pri sm">保存</span>`;

  return shell(`<div class="ep">
    <div class="ep-bar"><span class="ep-back">← 返回</span>
      <span class="ep-title">${builtin?'Cowork':'写作助手'}</span>

function sOverview(){

    <h3>实体关系</h3>
    <div class="erd">
<b>AGENT</b>（引擎，非助手）──被多个助手引用──▶ <b>助手 ASSISTANT</b>

          系统为每个可用 AGENT 自动生成一个"裸"助手

<b>助手</b> ──各一份──▶ <b>上次选择记录</b>（"自动记住上次"用）
<b>助手</b> ──默认技能/MCP──▶ <b>SKILL / MCP</b>
<b>团队 TEAM</b> ──含多个──▶ <b>成员</b> ──选自──▶ <b>助手</b>（继承其配置）
    </div>

  const cols=[];
  if(f.bg) cols.push(`<div><h3>背景</h3><p>${f.bg}</p></div>`);
  if(f.points) cols.push(`<div><h3>需求要点</h3><ul>${f.points.map(p=>`<li>${p}</li>`).join('')}</ul></div>`);
  if(f.ac) cols.push(`<div><h3>验收标准</h3><div class="ac">${f.ac.map(a=>`<div>${a}</div>`).join('')}</div></div>`);
  return `<div class="req">${head}<div class="req-cols">${cols.join('')}</div></div>`;
}

let curPhase='overview', curFeat='ov';
function renderFeatTabs(){
  const feats=PHASES[curPhase].feats;
  const tabs=document.getElementById('featTabs');
  if(curPhase==='overview'){ tabs.innerHTML=''; tabs.style.display='none'; return; }
  tabs.style.display='flex';
  tabs.innerHTML=feats.map(f=>`<button class="feat-btn ${f.id===curFeat?'on':''}" data-fid="${f.id}">
    <span class="fc">${f.code.replace('F','').replace('-','·')}</span>${f.title}</button>`).join('');
  tabs.querySelectorAll('.feat-btn').forEach(b=>b.onclick=()=>{curFeat=b.dataset.fid;draw();});
}
function draw(){
  document.querySelectorAll('.phase-btn').forEach(b=>b.classList.toggle('on',b.dataset.ph===curPhase));
  const feats=PHASES[curPhase].feats;
  if(!feats.find(f=>f.id===curFeat)) curFeat=feats[0].id;
  renderFeatTabs();
  const f=feats.find(x=>x.id===curFeat);
  document.getElementById('left').innerHTML=f.scene();
  document.getElementById('right').innerHTML=renderRight(f);
  // 总览整页（右侧隐藏）；功能点左右布局
  document.querySelector('.split').classList.toggle('full', curPhase==='overview');
  document.querySelector('.left').scrollTop=0;
  document.querySelector('.right').scrollTop=0;
}
document.querySelectorAll('.phase-btn').forEach(b=>b.onclick=()=>{
  curPhase=b.dataset.ph; curFeat=PHASES[curPhase].feats[0].id; draw();
});
draw();
</script>
</body>
