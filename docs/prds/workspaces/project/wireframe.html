<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project · 多文件夹文件浏览器 · 线框图</title>
    <style>
      :root {
        --bg-base: #ffffff;
        --bg-1: #f9fafb;
        --bg-2: #f2f3f5;
        --bg-3: #e5e6eb;
        --t1: #1d2129;
        --t2: #454d5f;
        --t3: #86909c;
        --t4: #c9cdd4;
        --border: #e5e6eb;
        --border-light: #f2f3f5;
        --aou-1: #eff0f6;
        --aou-2: #e5e7f0;
        --aou-6: #7583b2;
        --aou-7: #596590;
        --primary: #165dff;
        --success: #00b42a;
        --warning: #ff7d00;
        --danger: #f53f3f;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        background: var(--bg-2);
        color: var(--t1);
        font-size: 13px;
        line-height: 1.5;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      .topbar {
        flex: 0 0 auto;
        background: var(--bg-base);
        border-bottom: 1px solid var(--border);
      }
      .topbar-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
      }
      .topbar-row.phases {
        border-bottom: 1px solid var(--border-light);
      }
      .doc-title {
        font-weight: 600;
        font-size: 13px;
        color: var(--aou-7);
        margin-right: 8px;
        white-space: nowrap;
      }
      .feat-tabs {
        display: flex;
        align-items: center;
        gap: 2px;
        padding: 7px 14px;
        overflow-x: auto;
      }
      .feat-btn {
        flex: 0 0 auto;
        border: none;
        background: transparent;
        cursor: pointer;
        padding: 5px 10px;
        border-radius: 7px;
        font-size: 12px;
        color: var(--t3);
        white-space: nowrap;
      }
      .feat-btn:hover {
        background: var(--bg-2);
      }
      .feat-btn.on {
        background: var(--aou-1);
        color: var(--aou-7);
        font-weight: 600;
      }
      .feat-btn .fc {
        font-family: ui-monospace, monospace;
        font-size: 10.5px;
        opacity: 0.65;
        margin-right: 4px;
      }

      .split {
        flex: 1 1 auto;
        display: flex;
        min-height: 0;
      }
      .left {
        flex: 1 1 60%;
        min-width: 0;
        overflow: auto;
        padding: 24px;
        background: var(--bg-2);
      }
      .right {
        flex: 0 0 40%;
        max-width: 540px;
        min-width: 0;
        overflow: auto;
        background: var(--bg-base);
        border-left: 1px solid var(--border);
        padding: 24px 26px;
      }
      .split.full .left {
        flex: 1 1 100%;
      }
      .split.full .right {
        display: none;
      }
      @media (max-width: 920px) {
        .split {
          flex-direction: column;
        }
        .right {
          flex: none;
          max-width: none;
          border-left: none;
          border-top: 1px solid var(--border);
        }
      }

      .req h2 {
        font-size: 17px;
        margin: 3px 0 0;
      }
      .req .flags {
        margin: 9px 0 16px;
        display: flex;
        gap: 6px;
      }
      .badge {
        display: inline-block;
        font-size: 11px;
        padding: 2px 9px;
        border-radius: 20px;
        font-weight: 500;
      }
      .badge.new {
        background: #e8f9ee;
        color: #0a8a2c;
      }
      .badge.mod {
        background: #fff3e0;
        color: #cc7000;
      }
      .req h3 {
        font-size: 12px;
        margin: 20px 0 7px;
        color: var(--t3);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        font-weight: 600;
      }
      .req p,
      .req li {
        font-size: 13px;
        color: var(--t2);
      }
      .req ul {
        margin: 6px 0;
        padding-left: 18px;
      }
      .req li {
        margin-bottom: 5px;
      }
      .story {
        background: var(--aou-1);
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 13px;
        color: var(--t2);
        margin: 2px 0 4px;
      }
      .story b {
        color: var(--aou-7);
      }
      .ac div {
        font-size: 12.5px;
        color: var(--t2);
        padding: 3px 0 3px 22px;
        position: relative;
      }
      .ac div:before {
        content: '';
        position: absolute;
        left: 4px;
        top: 8px;
        width: 11px;
        height: 11px;
        border: 1.5px solid var(--t4);
        border-radius: 3px;
      }
      .req table {
        width: 100%;
        border-collapse: collapse;
        margin: 8px 0;
        font-size: 12px;
      }
      .req th,
      .req td {
        border: 1px solid var(--border);
        padding: 6px 9px;
        text-align: left;
        vertical-align: top;
      }
      .req th {
        background: var(--bg-2);
        font-weight: 600;
      }

      .app {
        position: relative;
        background: var(--bg-base);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(29, 33, 41, 0.06);
        max-width: 940px;
        margin: 0 auto;
      }
      .titlebar {
        height: 36px;
        background: var(--bg-2);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 12px;
        gap: 12px;
      }
      .tb-dots {
        display: flex;
        gap: 7px;
      }
      .tb-dots i {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        display: block;
      }
      .tb-dots .r {
        background: #ff5f57;
      }
      .tb-dots .y {
        background: #febc2e;
      }
      .tb-dots .g {
        background: #28c840;
      }
      .tb-ico {
        color: var(--t3);
        font-size: 14px;
      }
      .tb-brand {
        flex: 1;
        text-align: center;
        font-weight: 600;
        font-size: 12.5px;
        color: var(--t2);
      }
      .body {
        display: flex;
        height: 560px;
      }
      .sider {
        flex: 0 0 158px;
        background: var(--bg-2);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 10px 8px;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 9px;
        font-weight: 700;
        font-size: 14px;
        color: var(--aou-7);
        padding: 5px 8px 12px;
      }
      .logo .sq {
        width: 24px;
        height: 24px;
        border-radius: 7px;
        background: linear-gradient(135deg, var(--aou-6), var(--aou-7));
      }
      .si {
        height: 30px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 10px;
        border-radius: 8px;
        font-size: 12.5px;
        color: var(--t2);
        cursor: pointer;
        font-weight: 500;
      }
      .si:hover {
        background: var(--bg-3);
      }
      .si.on {
        background: var(--bg-3);
        font-weight: 600;
        color: var(--t1);
      }
      .si .di {
        width: 16px;
        text-align: center;
        font-size: 13px;
        color: var(--t3);
      }
      .si-div {
        height: 1px;
        background: var(--border);
        margin: 8px 6px;
      }
      .si-grp {
        font-size: 11px;
        color: var(--t3);
        padding: 10px 10px 3px;
        font-weight: 600;
      }
      .si-sp {
        flex: 1;
      }

      /* 对话主区 + 右侧 Project 面板 */
      .conv-wrap {
        display: flex;
        height: 100%;
      }
      .conv {
        flex: 1 1 auto;
        display: flex;
        flex-direction: column;
        min-width: 0;
        border-right: 1px solid var(--border);
      }
      .conv-h {
        flex: 0 0 auto;
        height: 42px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 0 14px;
        font-size: 13px;
      }
      .conv-h .av {
        width: 22px;
        height: 22px;
        border-radius: 6px;
        background: var(--aou-1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
      }
      .conv-h .nm {
        font-weight: 600;
      }
      .conv-b {
        flex: 1;
        overflow: auto;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 11px;
      }
      .msg {
        max-width: 84%;
        font-size: 12px;
        line-height: 1.5;
        padding: 8px 11px;
        border-radius: 11px;
      }
      .msg.u {
        align-self: flex-end;
        background: var(--aou-6);
        color: #fff;
        border-bottom-right-radius: 4px;
      }
      .msg.a {
        align-self: flex-start;
        background: var(--bg-2);
        color: var(--t1);
        border-bottom-left-radius: 4px;
      }
      .chip-file {
        align-self: flex-end;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--bg-base);
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 5px 10px;
        font-size: 11px;
        color: var(--t2);
        max-width: 90%;
      }
      .chip-file .pth {
        font-family: ui-monospace, monospace;
        font-size: 10px;
        color: var(--t4);
      }

      .panel {
        flex: 0 0 320px;
        display: flex;
        flex-direction: column;
        background: var(--bg-1);
      }
      .panel-tabs {
        flex: 0 0 auto;
        display: flex;
        gap: 16px;
        border-bottom: 1px solid var(--border);
        padding: 0 14px;
        background: var(--bg-base);
      }
      .panel-tabs span {
        padding: 10px 0;
        font-size: 12.5px;
        color: var(--t3);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
      }
      .panel-tabs span.on {
        color: var(--aou-7);
        border-bottom-color: var(--aou-6);
        font-weight: 600;
      }
      .panel-title {
        flex: 0 0 auto;
        font-size: 11px;
        color: var(--t3);
        font-weight: 600;
        padding: 8px 14px 4px;
        letter-spacing: 0.03em;
      }

      /* 工具栏：加号 + 搜索框 + 刷新 */
      .ws-toolbar {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 6px 12px 8px;
      }
      .addbtn {
        width: 26px;
        height: 26px;
        border: 1px solid var(--border);
        border-radius: 7px;
        background: var(--bg-base);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        color: var(--aou-7);
        cursor: pointer;
        flex: 0 0 auto;
        position: relative;
      }
      .addbtn:hover {
        background: var(--aou-1);
        border-color: var(--aou-2);
      }
      .addbtn .tip {
        position: absolute;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--t1);
        color: #fff;
        font-size: 10.5px;
        padding: 3px 8px;
        border-radius: 6px;
        white-space: nowrap;
        z-index: 5;
        font-weight: 400;
      }
      .searchbox {
        flex: 1;
        border: 1px solid var(--border);
        border-radius: 7px;
        background: var(--bg-base);
        padding: 5px 10px;
        font-size: 12px;
        color: var(--t4);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .refresh {
        color: var(--t3);
        cursor: pointer;
        font-size: 14px;
        flex: 0 0 auto;
      }

      .tree {
        flex: 1;
        overflow: auto;
        padding: 4px 6px 10px;
      }
      /* 根节点 */
      .root {
        margin-top: 6px;
      }
      .root:first-child {
        margin-top: 2px;
      }
      .root-h {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 6px 8px;
        border-radius: 7px;
        cursor: pointer;
        position: relative;
      }
      .root-h:hover {
        background: var(--bg-2);
      }
      .root-h .caret {
        color: var(--t3);
        font-size: 10px;
        width: 10px;
      }
      .root-h .ri {
        font-size: 14px;
      }
      .root-h .rn {
        font-size: 13px;
        font-weight: 700;
        color: var(--t1);
      }
      .root-tag {
        font-size: 9.5px;
        padding: 1px 7px;
        border-radius: 9px;
        font-weight: 600;
        background: var(--aou-1);
        color: var(--aou-7);
      }
      .root-tag.wd {
        background: #e8f0ff;
        color: #2a6fd4;
      }
      .root-info {
        margin-left: auto;
        color: var(--t4);
        font-size: 12px;
        cursor: help;
      }
      /* hover 显示绝对路径 */
      .root-path {
        display: none;
        font-family: ui-monospace, monospace;
        font-size: 10px;
        color: var(--t4);
        padding: 0 8px 2px 25px;
      }
      .root.show-path .root-path {
        display: block;
      }
      /* 文件项 */
      .fi {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 4px 8px 4px 26px;
        border-radius: 6px;
        font-size: 12.5px;
        color: var(--t2);
        cursor: pointer;
      }
      .fi:hover {
        background: var(--bg-2);
      }
      .fi .fic {
        font-size: 13px;
      }
      .fi.sel {
        background: var(--aou-1);
        color: var(--aou-7);
      }

      /* 右键菜单 */
      .ctx {
        position: absolute;
        background: var(--bg-base);
        border: 1px solid var(--border);
        border-radius: 9px;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.14);
        padding: 5px;
        font-size: 12.5px;
        z-index: 10;
        min-width: 170px;
      }
      .ctx div {
        padding: 6px 11px;
        border-radius: 6px;
        cursor: pointer;
        color: var(--t1);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .ctx div:hover {
        background: var(--bg-2);
      }
      .ctx div.danger {
        color: var(--danger);
      }
      .ctx .sep {
        height: 1px;
        background: var(--border-light);
        margin: 4px 2px;
        padding: 0;
      }
      .ctx div.dis {
        color: var(--t4);
        cursor: not-allowed;
      }
      .ctx div.dis:hover {
        background: transparent;
      }

      /* 目录选择器（模拟系统弹窗） */
      .modal-stage {
        position: absolute;
        inset: 0;
        background: rgba(29, 33, 41, 0.28);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .picker {
        width: 100%;
        max-width: 380px;
        background: var(--bg-base);
        border-radius: 12px;
        border: 1px solid var(--border);
        overflow: hidden;
        box-shadow: 0 16px 48px rgba(29, 33, 41, 0.22);
      }
      .picker-h {
        padding: 13px 16px;
        font-weight: 600;
        font-size: 13px;
        border-bottom: 1px solid var(--border);
      }
      .picker-b {
        padding: 8px;
        max-height: 230px;
        overflow: auto;
      }
      .pdir {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 10px;
        border-radius: 7px;
        font-size: 12.5px;
        color: var(--t2);
        cursor: pointer;
      }
      .pdir:hover {
        background: var(--bg-2);
      }
      .pdir.on {
        background: var(--aou-1);
        color: var(--aou-7);
        font-weight: 600;
      }
      .picker-f {
        padding: 10px 16px;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: flex-end;
        gap: 9px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        border: 1px solid var(--border);
        background: var(--bg-base);
        border-radius: 8px;
        padding: 5px 13px;
        font-size: 12.5px;
        color: var(--t1);
        cursor: pointer;
      }
      .btn:hover {
        background: var(--bg-1);
      }
      .btn.pri-b {
        background: var(--aou-6);
        border-color: var(--aou-6);
        color: #fff;
      }

      .spot-tag2 {
        display: inline-block;
        background: var(--aou-6);
        color: #fff;
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 8px;
        font-weight: 500;
        margin-bottom: 10px;
      }

      /* overview */
      .ov {
        max-width: 880px;
        margin: 0 auto;
      }
      .ov h2 {
        font-size: 19px;
        margin: 0 0 4px;
      }
      .ov .lead {
        color: var(--t3);
        font-size: 13px;
        margin-bottom: 20px;
      }
      .ov h3 {
        font-size: 14px;
        margin: 22px 0 9px;
        color: var(--t1);
        border-left: 3px solid var(--aou-6);
        padding-left: 9px;
      }
      .ov table {
        width: 100%;
        border-collapse: collapse;
        margin: 8px 0;
        font-size: 12.5px;
      }
      .ov th,
      .ov td {
        border: 1px solid var(--border);
        padding: 7px 10px;
        text-align: left;
        vertical-align: top;
      }
      .ov th {
        background: var(--bg-2);
        font-weight: 600;
      }
      .ov code {
        font-family: ui-monospace, monospace;
        background: var(--bg-2);
        padding: 1px 5px;
        border-radius: 4px;
        font-size: 11.5px;
        color: var(--aou-7);
      }
      .erd {
        background: var(--bg-1);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 16px;
        font-family: ui-monospace, monospace;
        font-size: 12px;
        line-height: 1.9;
        color: var(--t2);
        overflow: auto;
      }
      .erd b {
        color: var(--aou-7);
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="topbar-row phases">
        <a href="../../index.html" style="font-size: 13px; color: var(--aou-7); text-decoration: none; white-space: nowrap"
          >← 文档首页</a
        ><span style="color: var(--border)">|</span><span class="doc-title">Project · 多文件夹文件浏览器 · 线框图</span>
      </div>
      <div class="feat-tabs" id="featTabs"></div>
    </div>
    <div class="split" id="split">
      <div class="left" id="left"></div>
      <div class="right" id="right"></div>
    </div>

    <script>
      function shell(inner) {
        return `<div class="app">
    <div class="titlebar"><span class="tb-dots"><i class="r"></i><i class="y"></i><i class="g"></i></span>
      <span class="tb-ico">☰</span><span class="tb-brand">AionUi</span><span class="tb-ico">⤢</span></div>
    <div class="body">
      <div class="sider"><div class="logo"><span class="sq"></span>AionUi</div>
        <div class="si"><span class="di">＋</span>新建会话</div>
        <div class="si"><span class="di">🔍</span>搜索</div>
        <div class="si-div"></div>
        <div class="si-grp">📁 AionUi 项目</div>
        <div class="si on">重构方案讨论</div>
        <div class="si">整理调研资料</div>
        <div class="si-sp"></div>
        <div class="si"><span class="di">⚙️</span>设置</div>
      </div>
      <div class="main" style="flex:1;min-width:0;overflow:hidden;">${inner}</div></div></div>`;
      }
      function panelTabs() {
        return `<div class="panel-tabs"><span class="on">Files</span><span>Changes</span></div>`;
      }
      function fi(icon, name, sel) {
        return `<div class="fi${sel ? ' sel' : ''}"><span class="fic">${icon}</span>${name}</div>`;
      }

      /* 根节点 */
      function root(opt) {
        // opt: {name, tag, path, files, showPath, single}
        const tagHtml = opt.tag ? `<span class="root-tag ${opt.tagCls || ''}">${opt.tag}</span>` : '';
        const info = opt.tag === '工作目录' ? `<span class="root-info" title="AI 默认在这里读写文件">ⓘ</span>` : '';
        return `<div class="root${opt.showPath ? ' show-path' : ''}">
    <div class="root-h"><span class="caret">▾</span><span class="ri">📂</span>
      <span class="rn">${opt.name}</span>${tagHtml}${info}</div>
    <div class="root-path">${opt.path}</div>
    ${(opt.files || []).map((f) => fi(f[0], f[1], f[2])).join('')}
  </div>`;
      }

      /* Files 面板（多文件夹） */
      function filesPanel(opt) {
        opt = opt || {};
        const roots = opt.single
          ? root({
              name: 'AionUi',
              tag: '工作目录',
              tagCls: 'wd',
              path: '/Users/veryliu/Documents/GitHub/AionUi',
              files: [
                ['📁', 'src'],
                ['📁', 'docs'],
                ['📄', 'package.json'],
                ['📄', 'README.md'],

      /* 总览 */

        return `<div class="ov">
    <h2>Project · 多文件夹文件浏览器</h2>
    <div class="lead">把"工作空间"从单一挂载目录升级成能容纳多个文件夹的 Project：像 IDE 一样把多个文件夹并列在左侧文件树，让一次对话跨多个文件夹工作。</div>

    <h3>要解决的问题</h3>
    <p>agent 启动必须 cd 一个目录 → 今天一次对话只挂在一个文件夹上。但用户想一边参考 A 文件夹、一边在 B 文件夹干活，或把别处的文件拉进来给 AI 看 —— 现在做不到。</p>

    <h3>核心设计</h3>
    <table>
      <tr><th>维度</th><th>结论</th></tr>
      <tr><td>Project 形态</td><td>一个 Project = 多文件夹集合；面板叫 <b>Project</b>，含 Tab <b>Files / Changes</b></td></tr>
      <tr><td>工作目录</td><td>第一个文件夹 = agent cd 的路径，<b>显性标记 + 固定置顶</b>；创建时定下、<b>进行中锁死</b></td></tr>
      <tr><td>附加文件夹</td><td>平级排在工作目录下；<b>不用软链接</b>，只记路径集合；可随时增删（不删磁盘）</td></tr>
      <tr><td>加文件夹</td><td>搜索框<b>左侧加号</b>，hover 提示 "Add Folder to Project"</td></tr>
      <tr><td>绑定层级</td><td><b>Project 级</b>，持久化（重开还在）</td></tr>
      <tr><td>add to chat</td><td>统一发<b>绝对路径</b>给 AI，实现跨文件夹工作</td></tr>
    </table>

    <h3>工作目录 vs 附加文件夹</h3>
    <table>
      <tr><th></th><th>工作目录</th><th>附加文件夹</th></tr>
      <tr><td>是什么</td><td>第一个文件夹，agent cd 的目录</td><td>额外加入、供 AI 查阅取用</td></tr>
      <tr><td>AI 行为</td><td>默认在此读写、执行命令</td><td>按绝对路径读写，家不在这</td></tr>
      <tr><td>在树里</td><td>固定置顶 + 标签</td><td>排其下，平级</td></tr>
      <tr><td>可移除</td><td>否</td><td>可（Remove from Project）</td></tr>
      <tr><td>可更改</td><td>创建时定，进行中锁死</td><td>随时增删</td></tr>
    </table>

    <h3>参考：Zed 的多 worktree</h3>
    <p>Zed 一个 project 可加多个文件夹，存的是<b>多个独立绝对路径</b>（非软链接），用 <code>(文件夹, 相对路径)</code> 定位。开 terminal 默认落点 fallback 到<b>第一个文件夹</b> —— 即"事实上的工作目录"。本设计据此把工作目录显性化（AionUi 的 AI 比 Zed 更依赖这个 cd 锚点）。</p>

    <h3>实体关系</h3>
    <div class="erd"><b>PROJECT</b> ||--|| <b>WORKING_DIR</b>  : 有且仅一个工作目录（锁定）
<b>PROJECT</b> ||--o{ <b>EXTRA_FOLDER</b> : 可含多个附加文件夹（可增删）
<b>PROJECT</b> ||--o{ <b>CONVERSATION</b> : 下含多个对话
<b>WORKING_DIR</b> ||--|| <b>AGENT_CWD</b> : agent 启动 cd 于此

文件定位：(属于哪个文件夹 + 相对路径)；递给 AI 统一用绝对路径</div>
  </div>`;

        if (r.story) h += `<div class="story">${r.story}</div>`;
        if (r.now) h += `<h3>现状</h3><p>${r.now}</p>`;
        h += `<h3>需求</h3><ul>` + r.need.map((n) => `<li>${n}</li>`).join('') + `</ul>`;
        if (r.flow) {
          h += `<h3>正常流程</h3><ul>` + r.flow.map((f, i) => `<li>${i + 1}. ${f}</li>`).join('') + `</ul>`;
        }
        if (r.exc) {
          h += `<h3>异常情况</h3><ul>` + r.exc.map((e) => `<li>${e}</li>`).join('') + `</ul>`;
        }
        if (r.note) {
          h += `<div class="story" style="background:var(--bg-1);color:var(--t3);">⚙ ${r.note}</div>`;
        }
        h += `<h3>验收标准</h3><div class="ac">` + r.ac.map((a) => `<div>${a}</div>`).join('') + `</div></div>`;
        return h;
      }

      const tabsEl = document.getElementById('featTabs');

        tabsEl.innerHTML = FEATS.map(
          (f) => `<button class="feat-btn ${f.id === cur ? 'on' : ''}" data-id="${f.id}">
    ${f.code ? `<span class="fc">${f.code}</span>` : ''}${f.name}</button>`
        ).join('');
        tabsEl.querySelectorAll('.feat-btn').forEach(
          (b) =>
            (b.onclick = () => {
              cur = b.dataset.id;
              build();
            })
        );
        const f = FEATS.find((x) => x.id === cur);
        leftEl.innerHTML = f.render();
        if (f.full) {
          splitEl.classList.add('full');
          rightEl.innerHTML = '';
        } else {
          splitEl.classList.remove('full');
          rightEl.innerHTML = renderReq(f.req);
        }
      }
